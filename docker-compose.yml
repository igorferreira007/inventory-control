services:
  postgres:
    image: postgres:17
    container_name: inventory-control-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inventory_control
    ports:
      - "5432:5432"
    volumes:
      - inventory_control_postgres_data:/var/lib/postgresql/data

volumes:
  inventory_control_postgres_data: